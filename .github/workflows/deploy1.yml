name: Deploy Website
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@invalid
    - name: Configure Pages
      uses: actions/configure-pages@v5
    - name: Upload
      uses: actions/upload-pages-artifact@v3
      with:
        path: .
    - name: Deploy
      id: deployment
      uses: actions/deploy-pages@v4
